{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Connexion — Studora{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-0 mt-4">
      <div class="card-body p-4">

        <div class="text-center mb-4">
          <i class="bi bi-box-arrow-in-right text-primary fs-1"></i>
          <h4 class="mt-2 fw-bold">Connexion</h4>
          <p class="text-muted small">Accédez à votre espace Studora</p>
        </div>

        <form method="post" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-box-arrow-in-right me-1"></i>Se connecter
            </button>
          </div>
        </form>

        <hr />
        <p class="text-center text-muted small mb-0">
          Pas encore de compte ?
          <a href="{% url 'register' %}">S'inscrire</a>
        </p>

      </div>
    </div>
  </div>
</div>
{% endblock %}
