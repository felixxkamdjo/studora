{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Inscription — Studora{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-0 mt-4">
      <div class="card-body p-4">

        <div class="text-center mb-4">
          <i class="bi bi-person-plus-fill text-primary fs-1"></i>
          <h4 class="mt-2 fw-bold">Créer un compte</h4>
          <p class="text-muted small">Rejoignez la plateforme Studora</p>
        </div>

        <form method="post" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle me-1"></i>S'inscrire
            </button>
          </div>
        </form>

        <hr />
        <p class="text-center text-muted small mb-0">
          Déjà un compte ?
          <a href="{% url 'login' %}">Se connecter</a>
        </p>

      </div>
    </div>
  </div>
</div>
{% endblock %}
