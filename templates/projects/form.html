{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ action }} un projet — Studora{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-7">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">

        <h4 class="fw-bold mb-4">
          <i class="bi bi-folder-plus me-2 text-primary"></i>{{ action }} un projet
        </h4>

        <form method="post" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex justify-content-between mt-4">
            <a href="{% url 'project_list_teacher' %}" class="btn btn-outline-secondary">
              <i class="bi bi-arrow-left me-1"></i>Annuler
            </a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle me-1"></i>{{ action }}
            </button>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
